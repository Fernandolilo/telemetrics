version: '3.8'

services:
  telemetry:
    build: .
    container_name: obd_telemetry
    restart: always
    privileged: true
    cap_add:
      - NET_ADMIN
    ports:
      - "5000:5000"
    networks:
      - obd_net
    volumes:
      - .:/app
    environment:
      - PYTHONUNBUFFERED=1

networks:
  obd_net:
    driver: bridge