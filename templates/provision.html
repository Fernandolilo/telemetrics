<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Itech - Conexão Scanner</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen flex items-center justify-center">

    <div class="max-w-md w-full bg-gray-800 p-8 rounded-xl shadow-xl border border-gray-700">
        <h1 class="text-2xl font-bold mb-6 text-blue-400">Scanner OBDII</h1>

        <div id="step-scanner">
            <p class="text-gray-400 mb-4">Pressione para buscar o dispositivo...</p>
            <button id="btnConnect" onclick="conectar()" class="w-full bg-blue-600 hover:bg-blue-500 py-3 rounded font-bold transition">
                Buscar Scanner
            </button>
        </div>

        <div id="step-profile" class="hidden">
            <p class="text-green-400 mb-4">Scanner Encontrado!</p>
            <select id="profile-list" class="w-full bg-gray-700 p-3 rounded mb-4"></select>
            <button onclick="vincular()" class="w-full bg-green-600 hover:bg-green-500 py-3 rounded font-bold">
                Vincular e Iniciar
            </button>
        </div>
    </div>

    <script>
        async function conectar() {
            const btn = document.getElementById('btnConnect');
            btn.innerText = "Aguardando Bluetooth...";
            btn.disabled = true;

            const response = await fetch('/api/scanner/connect', { method: 'POST' });
            const data = await response.json();

            if (data.status === "connected") {
                const select = document.getElementById('profile-list');
                select.innerHTML = data.profiles.map(p => `<option value="${p}">${p}</option>`).join('');
                document.getElementById('step-scanner').classList.add('hidden');
                document.getElementById('step-profile').classList.remove('hidden');
            } else {
                alert(data.message);
                btn.innerText = "Buscar Scanner";
                btn.disabled = false;
            }
        }

        async function vincular() {
            const modelo = document.getElementById('profile-list').value;
            const response = await fetch('/api/scanner/bind', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ modelo: modelo })
            });

            if (response.ok) {
                window.location.href = '/telemetrics';
            } else {
                alert("Erro ao vincular.");
            }
        }
    </script>
</body>
</html>
