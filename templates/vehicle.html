<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Itech - Consulta Veículo</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white p-8">

<div class="max-w-5xl mx-auto">
    <h1 class="text-3xl font-bold mb-6 text-blue-400">Itech - Consulta Veículo</h1>

    <div class="flex gap-2 mb-6">
        <input id="placa_busca" placeholder="Digite a placa (ex: RUG8E03)" class="flex-1 p-2 bg-gray-800 border border-gray-700 rounded" />
        <button id="btn_buscar" class="bg-blue-600 hover:bg-blue-500 px-4 rounded font-bold">Buscar</button>
    </div>

    <p id="status_busca" class="mb-4 text-sm"></p>
    <div id="data-container" class="grid gap-4"></div>
</div>

<script>
document.getElementById("btn_buscar").addEventListener("click", async () => {
    const placa = document.getElementById("placa_busca").value.trim();
    const status = document.getElementById("status_busca");
    const container = document.getElementById("data-container");
    const btn = document.getElementById("btn_buscar");

    if (!placa) return;

    try {
        btn.disabled = true;
        status.innerText = "Buscando...";
        status.className = "text-yellow-400";

        const response = await fetch(`${window.location.origin}/api/vehicle/${encodeURIComponent(placa)}`);
        const res = await response.json();

        if (!res || res.ok !== true) {
            throw new Error(res.error || "Veículo não encontrado");
        }

        // CORREÇÃO: Acessando o nível duplo de 'data' retornado pelo seu serviço
        // Navega por: res -> data -> data -> vehicle
        const v = (res.data && res.data.data) ? res.data.data.vehicle : 
                  (res.data ? res.data.vehicle : res.vehicle);
        
        if (!v) throw new Error("Estrutura de dados inválida");

        // Renderização dos dados
        container.innerHTML = `
            <div class="bg-gray-800 p-4 rounded border border-gray-700">
                <h2 class="text-lg font-bold text-blue-400 mb-2">Identificação</h2>
                <p><b>Placa:</b> ${v.identification?.placa || 'N/A'}</p>
                <p><b>Empresa:</b> ${v.identification?.codigo_empresa || 'N/A'}</p>
                <p><b>Device:</b> ${v.identification?.device_id || 'N/A'}</p>
            </div>
            <div class="bg-gray-800 p-4 rounded border border-gray-700">
                <h2 class="text-lg font-bold text-green-400 mb-2">Telemetria Atual</h2>
                <p>RPM: ${v.telemetry?.current?.rpm || 0}</p>
                <p>Velocidade: ${v.telemetry?.current?.velocidade || 0} km/h</p>
                <p>Odômetro: ${v.telemetry?.current?.odometro || 0}</p>
            </div>
            <div class="bg-gray-800 p-4 rounded border border-gray-700">
                <h2 class="text-lg font-bold text-yellow-400 mb-2">Histórico</h2>
                <p>Registros totais: ${v.telemetry?.history?.length || 0}</p>
            </div>
        `;

        status.innerText = "✔ Dados carregados";
        status.className = "text-green-400";

    } catch (err) {
        console.error("DEBUG:", err);
        status.innerText = "Erro: " + err.message;
        status.className = "text-red-400";
        container.innerHTML = "";
    } finally {
        btn.disabled = false;
    }
});
</script>
</body>
</html>
